# Datasource
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

> As variáveis `${PGHOST}`, `${PGUSER}` etc. são lidas automaticamente das **environment variables** do Railway — não precisa colocar os valores direto no código.

### Passo 4 — Configurar as variáveis no serviço do backend

1. No Railway, clique no seu serviço de **backend**
2. Vá em **"Variables"**
3. Adicione as mesmas variáveis que você copiou do banco:

PGHOST=postgres.railway.internal
PGPORT=5432
PGDATABASE=railway
PGUSER=postgres
PGPASSWORD=KPoxADmOfqLrjwRIVIUDZqraSqxQumty